<form action="/generate" method="post" enctype="multipart/form-data">

  <label>W.O Date:</label>
  <input type="text" name="woDate" placeholder="dd/mm/yyyy" required>

  <br><br>

  <label>SAC: </label>
  <input type="text" name="SAC" placeholder="SAC" required>

  <br><br>

  <label>Upload SES PDF:</label>
  <input type="file" name="pdf" required>

  <br><br>

  <button type="submit">Generate Invoice</button>

</form>
